<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="Get in touch with the TechTrend Store team.">
    <link rel="stylesheet" href="styles.css">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-66BHFK9T4P"></script>
    <script>

        function gtag() { dataLayer.push(arguments); }

        gtag('config', 'G-66BHFK9T4P');

<body id="page-contact">

    <header>
        <div class="nav-container">
            <a href="index.html" class="logo">TechTrend</a>
            <div class="hamburger">
                <i class="fas fa-bars"></i>
            </div>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="products.html">Products</a></li>
                    <li><a href="blog.html">Blog</a></li>
                    <li><a href="about.html">About Us</a></li>
                    <li><a href="contact.html" class="active">Contact Us</a></li>
                </ul>
            </nav>
            <form class="search-bar">
                <input type="text" placeholder="Search..." required>
                <button type="submit" id="contact-search-btn">Search</button>
            </form>
        </div>
    </header>

    <main>
        <section>
            <h1 class="section-title">Contact Us</h1>

            <div class="form-container">
                <p style="text-align: center; margin-bottom: 2rem;">Have a question about our dummy products or need
                    help setting up GTM? Send us a message below.</p>

                <form id="contact-form">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" name="name" required placeholder="John Doe">
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" required placeholder="john@example.com">
                    </div>

                    <div class="form-group">
                        <label for="subject">Subject</label>
                        <input type="text" id="subject" name="subject" required placeholder="Question about tracking">
                    </div>

                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="5" required
                            placeholder="Type your message here..."></textarea>
                    </div>

                    <button type="submit" class="form-submit" id="contact-submit-btn">Send Message</button>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <div class="social-icons">
            <a href="#" id="social-facebook-contact"><i class="fab fa-facebook-f">FB</i></a>
            <a href="#" id="social-twitter-contact"><i class="fab fa-twitter">TW</i></a>
            <a href="#" id="social-instagram-contact"><i class="fab fa-instagram">IG</i></a>
        </div>
        <p>&copy; 2026 TechTrend Store. Student Capstone Project.</p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
